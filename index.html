<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Puzzle Assignment</title>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: 1fr;   
      grid-template-rows: auto auto auto auto;
      grid-template-areas:
        "nm"
        "bfl"
        "pz"
        "dt";
      grid-gap: 20px;
      justify-items: center;
      padding: 20px;
    }

    .grid-item1 { grid-area: nm; }
    .grid-item2 { grid-area: bfl; }
    .grid-item3 { grid-area: pz; }
    .grid-item4 { grid-area: dt; }

    .flex-container {
      display: flex;
      flex-wrap: wrap;
      width: 560px; 
    }

    .flex-container img {
      width: 140px;  
      height: 100px;  
      object-fit: cover;
    }

    .hidden {
      display: none; 
    }
  </style>
</head>
<body>
  <section class="grid-container">

    <div class="grid-item1"><h2>Olexandr Pivtorak</h2></div>


    <div class="grid-item2"><h3>Butterfly Puzzle</h3></div>


    <div class="grid-item3">
      <div class="flex-container">
        <img src="images/puzzle1_Q.jpg" alt="piece1">
        <img src="images/puzzle1_G.jpg" alt="piece2">
        <img src="images/puzzle1_A.jpg" alt="piece3">
        <img src="images/puzzle1_J.jpg" alt="piece4">
        <img src="images/puzzle1_M.jpg" alt="piece5">
        <img src="images/puzzle1_P.jpg" alt="piece6">
        <img src="images/puzzle1_B.jpg" alt="piece7">
        <img src="images/puzzle1_H.jpg" alt="piece8">
        <img src="images/puzzle1_O.jpg" alt="piece9">
        <img src="images/puzzle1_E.jpg" alt="piece10">
        <img src="images/puzzle1_N.jpg" alt="piece11">
        <img src="images/puzzle1_C.jpg" alt="piece12">
        <img src="images/puzzle1_I.jpg" alt="piece13">
        <img src="images/puzzle1_F.jpg" alt="piece14">
        <img src="images/puzzle1_L.jpg" alt="piece15">
        <img src="images/puzzle1_K.jpg" alt="piece16">
        <img src="images/puzzle1_D.jpg" alt="faulty" class="hidden">
      </div>
    </div>


    <div class="grid-item4"><p>April 19, 2026</p></div>
  </section>
</body>
</html>
